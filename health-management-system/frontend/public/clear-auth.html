<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>清除登录状态 - 健康管理系统</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Hiragino Sans GB',
        'Microsoft YaHei', '微软雅黑', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
      max-width: 400px;
      width: 90%;
    }

    .icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 24px;
    }

    .icon svg {
      width: 40px;
      height: 40px;
      fill: white;
    }

    h1 {
      color: #333;
      font-size: 24px;
      margin-bottom: 16px;
    }

    p {
      color: #666;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .status {
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
    }

    .status.success {
      background: #f0f9eb;
      color: #67c23a;
      border: 1px solid #e1f3d8;
    }

    .status.info {
      background: #f4f4f5;
      color: #909399;
      border: 1px solid #e9e9eb;
    }

    .btn {
      display: inline-block;
      padding: 12px 32px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 16px;
      transition: transform 0.2s, box-shadow 0.2s;
      border: none;
      cursor: pointer;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }

    .countdown {
      color: #999;
      font-size: 12px;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
      </svg>
    </div>
    <h1>登录状态已清除</h1>
    <p>系统已自动清除您的登录状态，确保您可以从干净的状态开始使用。</p>
    <div id="status" class="status info">正在清除登录信息...</div>
    <a href="/login" class="btn">前往登录页面</a>
    <div class="countdown" id="countdown">3秒后自动跳转...</div>
  </div>

  <script>
    // 清除所有登录相关的存储
    function clearAuth() {
      // 清除localStorage
      const keysToRemove = [
        'health-management-role',
        'health-management-user-info',
        'pinia-user-store'
      ];

      keysToRemove.forEach(key => {
        localStorage.removeItem(key);
        console.log(`[Clear Auth] 已清除 localStorage: ${key}`);
      });

      // 清除所有cookie
      const cookies = document.cookie.split(';');
      cookies.forEach(cookie => {
        const [name] = cookie.split('=');
        const trimmedName = name.trim();
        // 设置cookie过期时间为过去
        document.cookie = `${trimmedName}=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;`;
        document.cookie = `${trimmedName}=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=${window.location.hostname};`;
        console.log(`[Clear Auth] 已清除 cookie: ${trimmedName}`);
      });

      // 清除sessionStorage
      sessionStorage.clear();
      console.log('[Clear Auth] 已清除 sessionStorage');
    }

    // 执行清除
    clearAuth();

    // 更新状态显示
    const statusEl = document.getElementById('status');
    statusEl.textContent = '登录信息清除完成！';
    statusEl.className = 'status success';

    // 倒计时跳转
    let countdown = 3;
    const countdownEl = document.getElementById('countdown');

    const timer = setInterval(() => {
      countdown--;
      if (countdown > 0) {
        countdownEl.textContent = `${countdown}秒后自动跳转...`;
      } else {
        clearInterval(timer);
        window.location.href = '/login';
      }
    }, 1000);

    console.log('[Clear Auth] 登录状态清除完成，准备跳转...');
  </script>
</body>
</html>
